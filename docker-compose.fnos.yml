# Nexus - 智能书签管理系统
# 飞牛 NAS (FnOS) Docker Compose 配置
# 针对飞牛 NAS 优化的简化配置
#
# 🚀 快速开始（3步）：
# 1. 复制本文件到飞牛 NAS 的 Docker 目录
# 2. 修改下面的环境变量（JWT_SECRET 和 SESSION_SECRET）
# 3. 在飞牛 Docker 中启动容器
#
# 📖 详细教程：https://github.com/sunaibot/Nexus/blob/main/docs/deploy/fnos-docker-guide.md

version: '3.8'

services:
  # 后端服务
  nexus-server:
    # 使用预构建镜像（飞牛用户推荐，无需自己构建）
    image: ghcr.io/sunaibot/nexus-server:latest
    # 如需自己构建，取消下面注释并注释掉上面的 image:
    # build:
    #   context: .
    #   dockerfile: apps/server/Dockerfile
    container_name: nexus-server
    restart: unless-stopped
    ports:
      # 飞牛 NAS 端口映射：主机端口:容器端口
      # 建议修改主机端口避免冲突
      - "8787:8787"
    volumes:
      # 数据持久化路径
      # 飞牛 NAS 建议路径：/vol1/@docker/nexus/data
      # 或保持默认：./data（相对于 docker-compose.yml 的位置）
      - ./data:/data
    environment:
      - NODE_ENV=production
      - PORT=8787
      - DB_PATH=/data/zen-garden.db
      # ⚠️ 必须修改：JWT 签名密钥
      # 生成方法：在飞牛终端运行：openssl rand -base64 32
      # 或在线生成：https://generate-random.org/encryption-key-generator
      - JWT_SECRET=your-jwt-secret-here-change-this-in-production
      # ⚠️ 必须修改：Session 签名密钥（与 JWT_SECRET 不同）
      - SESSION_SECRET=your-session-secret-here-change-this-too
      # 日志级别（可选：debug/info/warn/error）
      - LOG_LEVEL=info
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  nexus-frontend:
    image: ghcr.io/sunaibot/nexus-frontend:latest
    # build:
    #   context: .
    #   dockerfile: apps/frontend/Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      # 如果通过域名访问，修改为实际域名
      # 飞牛内网访问：http://你的飞牛IP:8787
      - VITE_API_URL=http://nexus-server:8787
    networks:
      - nexus-network
    depends_on:
      nexus-server:
        condition: service_healthy

  # 管理后台
  nexus-manager:
    image: ghcr.io/sunaibot/nexus-manager:latest
    # build:
    #   context: .
    #   dockerfile: apps/manager/Dockerfile
    container_name: nexus-manager
    restart: unless-stopped
    ports:
      - "5174:80"
    environment:
      - VITE_API_URL=http://nexus-server:8787
    networks:
      - nexus-network
    depends_on:
      nexus-server:
        condition: service_healthy

networks:
  nexus-network:
    driver: bridge

# ============================================
# 🔧 飞牛 NAS 部署步骤
# ============================================
#
# 方法一：使用飞牛 Docker 图形界面（推荐新手）
# 1. 打开飞牛 OS 的 Docker 应用
# 2. 创建新的 Compose 项目
# 3. 上传此 docker-compose.fnos.yml 文件
# 4. 修改 JWT_SECRET 和 SESSION_SECRET
# 5. 启动项目
#
# 方法二：使用 SSH/终端（高级用户）
# 1. SSH 登录飞牛 NAS
# 2. cd 到 docker-compose.fnos.yml 所在目录
# 3. 运行：docker-compose -f docker-compose.fnos.yml up -d
#
# ============================================
# ⚠️ 重要安全提示
# ============================================
#
# 1. 必须修改密钥！
#    在飞牛终端运行以下命令生成密钥：
#    openssl rand -base64 32
#
# 2. 首次登录后必须修改默认密码
#    默认账号：admin / admin123
#
# 3. 如需外网访问，建议：
#    - 使用飞牛自带的反向代理
#    - 配置 HTTPS
#    - 修改默认端口
#
# ============================================
# 📁 数据备份
# ============================================
#
# 数据存储在 ./data 目录（相对于 docker-compose 文件）
# 飞牛 NAS 建议映射到：/vol1/@docker/nexus/data
# 备份时只需复制 data 目录即可
#
# ============================================
# 🔗 访问地址
# ============================================
#
# 前台页面：http://你的飞牛IP:5173
# 管理后台：http://你的飞牛IP:5174
# API 服务：http://你的飞牛IP:8787
#
