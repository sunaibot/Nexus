# Nexus - 仅后端服务（临时方案）
# 用于网络不好时先部署 server

services:
  nexus-server:
    image: song13521/nexus-server:latest
    pull_policy: always
    container_name: nexus-server
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - "/vol1/1000/docker/nexus/data:/data"
    environment:
      - NODE_ENV=production
      - PORT=8787
      - DB_PATH=/data/zen-garden.db
      - YOUR_PASSWORD=${YOUR_PASSWORD:-}
      - LOG_LEVEL=info
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  nexus-network:
    driver: bridge
