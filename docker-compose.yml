# Nexus - 智能书签管理系统
# Docker Compose 配置文件
# GitHub: https://github.com/sunaibot/Nexus
#
# 🚀 快速开始：
# 1. 复制 .env.example 为 .env，修改 YOUR_PASSWORD
# 2. 运行：docker-compose up -d
#
# 📖 详细教程：README.md

version: '3'

services:
  # ============================================
  # 后端服务（API）
  # ============================================
  nexus-server:
    image: song13521/nexus-server:latest
    pull_policy: always
    container_name: nexus-server
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${SERVER_PORT:-8787}:8787"
    volumes:
      # 数据持久化路径
      # 飞牛 NAS 默认：/vol1/1000/docker/nexus/data
      # 其他平台：修改为 ./data 或其他路径
      - "${DATA_PATH:-/vol1/1000/docker/nexus/data}:/data"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8787
      - DB_PATH=/data/zen-garden.db
      # 🔐 安全密钥：只需设置 YOUR_PASSWORD（至少8位）
      # 系统会自动基于 YOUR_PASSWORD 生成 JWT_SECRET 和 SESSION_SECRET
      - YOUR_PASSWORD=${YOUR_PASSWORD:-}
      # 跨域设置（可选）
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      # 日志级别：debug/info/warn/error
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 资源限制（可根据配置调整）
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ============================================
  # 前端服务（用户页面）
  # ============================================
  nexus-frontend:
    image: song13521/nexus-frontend:latest
    pull_policy: always
    container_name: nexus-frontend
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      - VITE_API_URL=http://nexus-server:8787
    networks:
      - nexus-network
    depends_on:
      nexus-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ============================================
  # 管理后台（可选）
  # 如不需要可删除或注释掉此服务
  # ============================================
  nexus-manager:
    image: song13521/nexus-manager:latest
    pull_policy: always
    container_name: nexus-manager
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "${MANAGER_PORT:-5174}:80"
    environment:
      - VITE_API_URL=http://nexus-server:8787
    networks:
      - nexus-network
    depends_on:
      nexus-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

networks:
  nexus-network:
    driver: bridge

# ============================================
# 📋 使用说明
# ============================================
#
# 【通用部署 - 适用于大多数平台】
#
# 1. 准备环境变量文件
#    cp .env.example .env
#
# 2. 编辑 .env 文件，修改以下必填项：
#    YOUR_PASSWORD=你的密码（至少8位）
#
# 3. 启动服务
#    docker-compose up -d
#
# 4. 访问服务
#    - 前台：http://localhost:5173
#    - 管理：http://localhost:5174
#    - 默认账号：admin / admin123
#
# ============================================
# 🐄 飞牛 NAS 特别说明
# ============================================
#
# 在飞牛 NAS 上部署时，在 .env 文件中添加：
#
#   # 飞牛 NAS 数据路径
#   DATA_PATH=/vol1/1000/docker/nexus/data
#
#   # 飞牛 NAS 推荐的重启策略
#   RESTART_POLICY=on-failure:3
#
# 然后执行：
#   docker-compose up -d
#
# ============================================
# ⚠️ 安全提示
# ============================================
#
# 1. 必须修改默认密码！
#    在 .env 中设置 YOUR_PASSWORD（至少8位）
#
# 2. 首次登录后必须修改管理员密码
#    默认密码：admin123
#
# 3. 公网访问建议：
#    - 使用反向代理（Nginx/Caddy/飞牛自带）
#    - 配置 HTTPS
#    - 设置 ALLOWED_ORIGINS 限制来源
#
# 4. 定期备份数据目录
#    数据位置：./data（或你在 .env 中设置的路径）
#
# ============================================
# 📞 获取帮助
# ============================================
#
# - GitHub：https://github.com/sunaibot/Nexus
# - 安全文档：SECURITY_DEEP_ANALYSIS.md
# - API 文档：http://localhost:8787/api/docs
