version: '3.8'

services:
  # 后端 API 服务
  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    container_name: nowen-server
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=production
      - PORT=8787
      - DB_PATH=/data/zen-garden.db
    volumes:
      - ./data:/data
    networks:
      - nowen-network

  # 用户前端（静态文件由 Caddy 托管）
  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: nowen-frontend
    restart: unless-stopped
    ports:
      - "7171:80"
    networks:
      - nowen-network
    depends_on:
      - server

  # 管理后台（静态文件由 Caddy 托管）
  manager:
    build:
      context: .
      dockerfile: ./apps/manager/Dockerfile
    container_name: nowen-manager
    restart: unless-stopped
    ports:
      - "7272:80"
    networks:
      - nowen-network
    depends_on:
      - server

networks:
  nowen-network:
    driver: bridge

volumes:
  data:
    driver: local
