# Nexus - 智能书签管理系统
# Docker Compose 配置文件
# GitHub: https://github.com/sunaibot/Nexus
#
# 🚀 快速开始（只需2步）：
# 1. 复制 .env.example 为 .env，修改 YOUR_PASSWORD
# 2. 运行：docker-compose up -d
#
# 📖 详细教程：docs/deploy/fnos-docker-guide.md

version: '3.8'

services:
  # ============================================
  # 后端服务（API）
  # ============================================
  nexus-server:
    # 【方式1】自己构建（推荐开发/测试使用）
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    
    # 【方式2】使用预构建镜像（推荐 NAS/生产使用，无需构建）
    # 取消下面两行注释，并注释掉上面的 build 部分
    # image: ghcr.io/sunaibot/nexus-server:latest
    # pull_policy: always
    
    container_name: nexus-server
    restart: unless-stopped
    ports:
      # 端口映射：主机端口:容器端口
      # 如需修改，请同时修改 .env 中的 SERVER_PORT
      - "${SERVER_PORT:-8787}:8787"
    volumes:
      # 数据持久化
      # ${DATA_PATH} 在 .env 中定义，默认为 ./data
      # 飞牛 NAS 建议改为：/vol1/@docker/nexus/data
      - "${DATA_PATH:-./data}:/data"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8787
      - DB_PATH=/data/zen-garden.db
      # 🔐 安全密钥：只需设置 YOUR_PASSWORD，系统自动生成 JWT_SECRET 和 SESSION_SECRET
      # 或者手动设置 JWT_SECRET 和 SESSION_SECRET（高级用户）
      - YOUR_PASSWORD=${YOUR_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      # 跨域设置（可选）
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      # 日志级别：debug/info/warn/error
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8787/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 资源限制（可根据 NAS 配置调整）
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # 安全：只读根文件系统
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  # ============================================
  # 前端服务（用户页面）
  # ============================================
  nexus-frontend:
    # 【方式1】自己构建
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    
    # 【方式2】使用预构建镜像
    # image: ghcr.io/sunaibot/nexus-frontend:latest
    # pull_policy: always
    
    container_name: nexus-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      # API 地址（容器内部通信）
      - VITE_API_URL=http://nexus-server:8787
    networks:
      - nexus-network
    depends_on:
      nexus-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  # ============================================
  # 管理后台（可选）
  # 如不需要可删除或注释掉此服务
  # ============================================
  nexus-manager:
    # 【方式1】自己构建
    build:
      context: .
      dockerfile: apps/manager/Dockerfile
    
    # 【方式2】使用预构建镜像
    # image: ghcr.io/sunaibot/nexus-manager:latest
    # pull_policy: always
    
    container_name: nexus-manager
    restart: unless-stopped
    ports:
      - "${MANAGER_PORT:-5174}:80"
    environment:
      - VITE_API_URL=http://nexus-server:8787
    networks:
      - nexus-network
    depends_on:
      nexus-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

networks:
  nexus-network:
    driver: bridge

# ============================================
# 🔧 部署步骤（通用，适用于所有平台）
# ============================================
#
# 【通用步骤】
# 1. 准备环境变量文件
#    cp .env.example .env
#
# 2. 编辑 .env 文件，修改以下必填项：
#    YOUR_PASSWORD=你的密码（至少8位，如：woaini1234）
#    # 系统会自动根据你的密码生成安全密钥
#
# 3. 启动服务
#    docker-compose up -d
#
# 4. 查看日志
#    docker-compose logs -f
#
# 5. 访问服务
#    - 前台：http://localhost:5173
#    - 管理：http://localhost:5174
#    - 默认账号：admin / admin123
#
# ============================================
# 🐄 飞牛 NAS 用户特别说明
# ============================================
#
# 1. 数据路径建议修改为：
#    DATA_PATH=/vol1/@docker/nexus/data
#
# 2. 使用预构建镜像（无需构建，更快）：
#    - 注释掉 build: 部分
#    - 取消 image: 部分的注释
#
# 3. 在飞牛 Docker 图形界面中：
#    - 创建新的 Compose 项目
#    - 上传此 docker-compose.yml 文件
#    - 上传你的 .env 文件
#    - 启动项目
#
# ============================================
# ⚠️ 安全提示
# ============================================
#
# 1. 必须修改默认密码！
#    在 .env 中设置 YOUR_PASSWORD（至少8位）
#
# 2. 首次登录后必须修改管理员密码
#    默认密码：admin123
#
# 3. 公网访问建议：
#    - 使用反向代理（Nginx/Caddy/飞牛自带）
#    - 配置 HTTPS
#    - 设置 ALLOWED_ORIGINS 限制来源
#
# 4. 定期备份数据目录
#    数据位置：./data（或你在 .env 中设置的路径）
#
